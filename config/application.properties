
# ============================================================
# Native Kafka Trace Producer configuration
# ============================================================

# ---- Kafka connection ----
kafka.bootstrap.servers=54.169.30.154:9092
kafka.topic=trace-data

# ---- Delivery reliability ----
kafka.acks=all
kafka.retries=5
kafka.enable.idempotence=true

# Compression is set to none by default to reduce native build/runtime friction
# on constrained ARM64 deployments. If your librdkafka build supports it, you
# can switch this value to lz4 later.
kafka.compression.type=none

# ---- Trace producer behavior ----
trace.period.ms=1
trace.batch.size=1000
trace.max.frames=1000000
trace.send.interval.ms=100
trace.task.id=trace_001

# ---- Native producer tuning ----
kafka.batch.size.bytes=65536
kafka.linger.ms=10
kafka.buffer.memory=67108864
kafka.request.timeout.ms=60000
kafka.message.timeout.ms=120000
  